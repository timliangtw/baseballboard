<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>POWER BOARD - WBC</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#000;
  display:flex; justify-content:center; align-items:center;
  width:100vw; height:100vh; overflow:hidden;
  touch-action:none;
}
canvas {
  display:block;
  image-rendering:auto;
  cursor:none;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ═══════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════
const W = 1024, H = 576;

const TEAMS = [
  { id:'JPN', name:'JAPAN',          flag:'🇯🇵', primary:'#003288', secondary:'#FFFFFF', accent:'#CC0000' },
  { id:'USA', name:'USA',            flag:'🇺🇸', primary:'#002868', secondary:'#FFFFFF', accent:'#BF0A30' },
  { id:'DOM', name:'DOMINICA',       flag:'🇩🇴', primary:'#002D62', secondary:'#FFFFFF', accent:'#CE1126' },
  { id:'VEN', name:'VENEZUELA',      flag:'🇻🇪', primary:'#CF142B', secondary:'#FFFFFF', accent:'#003893' },
  { id:'KOR', name:'KOREA',          flag:'🇰🇷', primary:'#C60C30', secondary:'#FFFFFF', accent:'#003478' },
  { id:'MEX', name:'MEXICO',         flag:'🇲🇽', primary:'#006847', secondary:'#FFFFFF', accent:'#CE1126' },
  { id:'TPE', name:'CHINESE TAIPEI', flag:'🇹🇼', primary:'#003580', secondary:'#FFFFFF', accent:'#CE1126' },
  { id:'PUR', name:'PUERTO RICO',    flag:'🇵🇷', primary:'#CC0000', secondary:'#FFFFFF', accent:'#002868' },
  { id:'NED', name:'NETHERLANDS',    flag:'🇳🇱', primary:'#FF6600', secondary:'#FFFFFF', accent:'#003399' },
  { id:'AUS', name:'AUSTRALIA',      flag:'🇦🇺', primary:'#FFCD00', secondary:'#00843D', accent:'#000000' },
  { id:'ITA', name:'ITALY',          flag:'🇮🇹', primary:'#003399', secondary:'#FFFFFF', accent:'#009246' },
  { id:'CUB', name:'CUBA',           flag:'🇨🇺', primary:'#002A8F', secondary:'#FFFFFF', accent:'#CC0001' },
  { id:'PAN', name:'PANAMA',         flag:'🇵🇦', primary:'#CC0000', secondary:'#FFFFFF', accent:'#003399' },
  { id:'CAN', name:'CANADA',         flag:'🇨🇦', primary:'#CC0000', secondary:'#FFFFFF', accent:'#000000' },
];

// Strike zone — near home plate (bottom of field), pitcher is above it on screen
const SZ = { topY:396, topHW:34, botY:460, botHW:40, cx:512 };
const PITCH_START = { x:512, y:374 }; // pitcher rubber — correct mound position
const PITCH_CONTROL = 80;             // max random offset (px); center≈75% strike, edge≈55%

// Pitch types — affect speed, control radius, and ball movement
// Pitch types: label shown on button, km shows speed, desc explains the pitch
const PITCH_TYPES = [
  { id:'FAST',   label:'直球',   spd:0.028, ctrl:60,  col:'#FFFFFF', desc:'FAST BALL' },
  { id:'CURVE',  label:'曲球',   spd:0.021, ctrl:88,  col:'#88CCFF', desc:'CURVE BALL' },
  { id:'CHANGE', label:'變速',   spd:0.013, ctrl:105, col:'#FFAA44', desc:'CHANGE UP' },
];

// ═══════════════════════════════════════
//  STATE
// ═══════════════════════════════════════
let phase = 'TITLE'; // TITLE | SETUP_INNING | SETUP_AWAY | SETUP_HOME | GAME

const cfg = { innings:3, awayIdx:-1, homeIdx:-1 };

const gs = {
  inning:1, half:'TOP',
  outs:0, balls:0, strikes:0,
  bases:[false,false,false],
  score:{ away:0, home:0 },
  inningScores:{ away:[], home:[] },
  batX: W/2, batY: 428,
  // Phase 2
  gamePhase: 'PITCH_AIM', // PITCH_AIM | BALL_FLIGHT | BATTING_WINDOW | SHOW_RESULT
  pitch: {
    aimX: SZ.cx, aimY: (SZ.topY+SZ.botY)/2,  // live aim cursor
    targetX: SZ.cx, targetY: (SZ.topY+SZ.botY)/2, // locked after click
    actualX: SZ.cx, actualY: (SZ.topY+SZ.botY)/2, // target + random offset
    t: 0,      // flight progress 0→1
    speed: 0.020,
    curve: 0, dropArc: 22,  // Phase 5: lateral break and vertical drop
  },
  result: { text:'', color:'#FFFFFF', timer:0, maxTimer:0, subtext:'' },
  // Phase 3
  swingAnim: { active:false, t:0, hitQuality:0 },
  lastResultType: '', // HR | 2B | 1B | FOUL | OUT | STRIKE | BALL | WALK
  halfStartScore: { away:0, home:0 },
  // Phase 4
  halfChange: { line1:'', line2:'', line3:'', col:'#FFFFFF', timer:0, maxTimer:0, gameOver:false },
  runFlash:   { runs:0, timer:0, side:'away' },
  // Phase 5
  pitchType: 0,
  hitFlight: { active:false, sx:0, sy:0, tx:0, ty:0, t:0, dur:60, arcH:80, type:'' },
  walkOffPending: false,
  // CPU
  cpuTimer: 0,
};

// ═══════════════════════════════════════
//  CANVAS SETUP
// ═══════════════════════════════════════
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
// High-DPI: render at device pixel ratio for crisp text and graphics
const dpr = Math.min(window.devicePixelRatio || 1, 3);
canvas.width  = W * dpr;
canvas.height = H * dpr;
ctx.scale(dpr, dpr);

let scale = 1, offX = 0, offY = 0;

function resize() {
  scale = Math.min(window.innerWidth / W, window.innerHeight / H);
  offX = (window.innerWidth  - W * scale) / 2;
  offY = (window.innerHeight - H * scale) / 2;
  canvas.style.width  = (W * scale) + 'px';
  canvas.style.height = (H * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();

function toL(cx, cy) {
  return { x:(cx - offX) / scale, y:(cy - offY) / scale };
}

// ═══════════════════════════════════════
//  INPUT
// ═══════════════════════════════════════
const mouse = { x: W/2, y: H/2 };

function onMove(cx, cy) {
  const p = toL(cx, cy);
  mouse.x = p.x; mouse.y = p.y;
  if (phase === 'GAME') {
    if (gs.gamePhase === 'PITCH_AIM') {
      // Pitcher aims anywhere below scoreboard
      gs.pitch.aimX = clamp(p.x, 60, W - 60);
      gs.pitch.aimY = clamp(p.y, 70, H - 20);
    } else {
      // Batter cursor active during flight and batting window
      gs.batX = clamp(p.x, 150, 800);
      gs.batY = clamp(p.y, 360, 492);
    }
  }
}
function onClick(cx, cy) { handleClick(toL(cx, cy)); }

canvas.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
canvas.addEventListener('mousedown', e => onClick(e.clientX, e.clientY));
canvas.addEventListener('touchmove', e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive:false });
canvas.addEventListener('touchstart', e => { e.preventDefault(); onClick(e.touches[0].clientX, e.touches[0].clientY); }, { passive:false });

function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ═══════════════════════════════════════
//  CLICK DISPATCH
// ═══════════════════════════════════════
function handleClick({ x, y }) {
  if (phase === 'TITLE') {
    if (inRect(x, y, W/2-130, 298, 260, 54)) phase = 'SETUP_INNING';
  }
  else if (phase === 'GAME_OVER') {
    if (inRect(x, y, W/2-130, 385, 260, 54)) phase = 'TITLE';
  }
  else if (phase === 'SETUP_INNING') {
    [3, 6, 9].forEach((n, i) => {
      if (inRect(x, y, W/2 - 200 + i*200 - 70, H/2 - 35, 140, 70)) {
        cfg.innings = n; phase = 'SETUP_AWAY';
      }
    });
  }
  else if (phase === 'SETUP_AWAY') {
    const i = teamCardAt(x, y);
    if (i !== -1) { cfg.awayIdx = i; phase = 'SETUP_HOME'; }
  }
  else if (phase === 'SETUP_HOME') {
    const i = teamCardAt(x, y);
    if (i !== -1 && i !== cfg.awayIdx) { cfg.homeIdx = i; startGame(); }
  }
  else if (phase === 'GAME') {
    if (gs.gamePhase === 'PITCH_AIM' && !isPlayerBatting()) {
      // Player's turn to pitch
      const pt = pitchTypeButtonAt(x, y);
      if (pt !== -1) { gs.pitchType = pt; }
      else { setPitch(gs.pitch.aimX, gs.pitch.aimY); }
    } else if (gs.gamePhase === 'BATTING_WINDOW' && isPlayerBatting()) {
      // Player's turn to bat
      doSwing();
    }
  }
}

function inRect(x, y, rx, ry, rw, rh) {
  return x >= rx && x <= rx + rw && y >= ry && y <= ry + rh;
}

function teamCardAt(x, y) {
  const COLS=7, CW=122, CH=80, GAP=8;
  const sx = (W - (COLS*CW + (COLS-1)*GAP)) / 2;
  const sy = 140;
  for (let i = 0; i < TEAMS.length; i++) {
    const c = i % COLS, r = Math.floor(i / COLS);
    if (inRect(x, y, sx + c*(CW+GAP), sy + r*(CH+GAP), CW, CH)) return i;
  }
  return -1;
}

function pitchTypeButtonAt(x, y) {
  const bw = 80, bh = 28, gap = 6;
  const startX = 12;
  const by = H - 54;
  for (let i = 0; i < PITCH_TYPES.length; i++) {
    if (inRect(x, y, startX + i * (bw + gap), by, bw, bh)) return i;
  }
  return -1;
}

function startGame() {
  gs.inning = 1; gs.half = 'TOP';
  gs.outs = 0; gs.balls = 0; gs.strikes = 0;
  gs.bases = [false, false, false];
  gs.score.away = 0; gs.score.home = 0;
  gs.inningScores.away = Array(cfg.innings).fill(null);
  gs.inningScores.home = Array(cfg.innings).fill(null);
  gs.batX = W/2; gs.batY = 428;
  gs.gamePhase = 'PITCH_AIM';
  gs.pitch.aimX = SZ.cx;
  gs.pitch.aimY = (SZ.topY + SZ.botY) / 2;
  gs.pitch.t = 0;
  gs.swingAnim = { active:false, t:0, hitQuality:0 };
  gs.lastResultType = '';
  gs.halfStartScore = { away:0, home:0 };
  gs.halfChange = { line1:'', line2:'', line3:'', col:'#FFFFFF', timer:0, maxTimer:0, gameOver:false };
  gs.runFlash   = { runs:0, timer:0, side:'away' };
  gs.pitchType  = 0;
  gs.hitFlight  = { active:false, sx:0, sy:0, tx:0, ty:0, t:0, dur:60, arcH:80, type:'' };
  gs.walkOffPending = false;
  gs.cpuTimer   = 0;  // TOP half starts: player pitches, no CPU timer needed
  phase = 'GAME';
}

// ═══════════════════════════════════════
//  DRAW HELPERS
// ═══════════════════════════════════════
function pxFont(sz) { return `${sz}px "Press Start 2P", monospace`; }

function txt(s, x, y, sz, col, align='center') {
  ctx.font = pxFont(sz);
  ctx.fillStyle = col;
  ctx.textAlign = align;
  ctx.textBaseline = 'middle';
  ctx.fillText(s, x, y);
}

function frect(x, y, w, h, col) {
  ctx.fillStyle = col;
  ctx.fillRect(x|0, y|0, w|0, h|0);
}

function srect(x, y, w, h, col, lw=2) {
  ctx.strokeStyle = col;
  ctx.lineWidth = lw;
  ctx.strokeRect((x|0)+.5, (y|0)+.5, w|0, h|0);
}

// ═══════════════════════════════════════
//  TITLE SCREEN
// ═══════════════════════════════════════
let tick = 0;

function drawTitle() {
  tick++;
  frect(0, 0, W, H, '#07071a');

  // Stars
  for (let i = 0; i < 90; i++) {
    const sx = (i*137+17) % W, sy = (i*91+33) % (H-70);
    if (Math.sin(tick*0.05 + i) > 0.6) frect(sx, sy, 2, 2, '#FFFFFF');
  }

  // Scanlines
  for (let y = 0; y < H; y += 4) frect(0, y, W, 2, 'rgba(0,0,0,0.25)');

  // Rainbow title
  const TITLE = 'POWER BOARD';
  const PAL = ['#FF4444','#FF8800','#FFFF44','#44FF44','#44AAFF','#FF44FF'];
  const cw = 37, startX = W/2 - (TITLE.replace(/ /g,'').length * cw) / 2;
  let ci = 0;
  for (let i = 0; i < TITLE.length; i++) {
    if (TITLE[i] === ' ') continue;
    ctx.font = `34px "Press Start 2P", monospace`;
    ctx.fillStyle = PAL[(ci + (tick>>3)) % PAL.length];
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.fillText(TITLE[i], startX + ci * cw, 120);
    ci++;
  }

  txt('WBC  EDITION', W/2, 172, 10, '#8888AA');

  // Pixel baseball
  drawBall(W/2, 248, 26);

  // Start button blink
  if ((tick >> 5) % 2 === 0) {
    frect(W/2-130, 298, 260, 54, '#AA1100');
    srect(W/2-130, 298, 260, 54, '#FF6644', 3);
    txt('PRESS  START', W/2, 325, 11, '#FFFFFF');
  }

  txt('v1.0', W/2, H-18, 6, '#333355');
}

function drawBall(cx, cy, r) {
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI*2);
  ctx.fillStyle = '#EEEEEE'; ctx.fill();
  ctx.strokeStyle = '#CC2200'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(cx-r*.18, cy, r*.72, -.55, .55); ctx.stroke();
  ctx.beginPath(); ctx.arc(cx+r*.18, cy, r*.72, Math.PI-.55, Math.PI+.55); ctx.stroke();
}

// ═══════════════════════════════════════
//  SETUP: INNING
// ═══════════════════════════════════════
function drawSetupInning() {
  frect(0, 0, W, H, '#07071a');
  txt('SELECT  INNINGS', W/2, 90, 15, '#FFFF44');
  txt('HOW MANY INNINGS?', W/2, 148, 8, '#888899');

  [
    { n:3, label:'3  INN', desc:'QUICK GAME' },
    { n:6, label:'6  INN', desc:'NORMAL GAME' },
    { n:9, label:'9  INN', desc:'FULL GAME' },
  ].forEach((b, i) => {
    const bx = W/2 - 200 + i*200, by = H/2 - 35;
    const hov = inRect(mouse.x, mouse.y, bx-70, by, 140, 70);
    frect(bx-70, by, 140, 70, hov ? '#1e1e3a' : '#111126');
    srect(bx-70, by, 140, 70, hov ? '#FFFF44' : '#4444AA', 3);
    txt(b.label, bx, by+22, 12, hov ? '#FFFF44' : '#FFFFFF');
    txt(b.desc,  bx, by+50, 6,  '#666688');
  });
}

// ═══════════════════════════════════════
//  SETUP: TEAM SELECT
// ═══════════════════════════════════════
function drawSetupTeam(isHome) {
  frect(0, 0, W, H, '#07071a');
  txt(isHome ? 'SELECT  YOUR  TEAM' : 'SELECT  CPU  TEAM', W/2, 50, 12,
      isHome ? '#44FF88' : '#FF8844');
  txt(isHome ? 'YOUR TEAM  —  HOME  (後攻)' : 'CPU TEAM  —  AWAY  (先攻)', W/2, 85, 7, '#666688');

  if (isHome && cfg.awayIdx >= 0) {
    const at = TEAMS[cfg.awayIdx];
    txt('AWAY: ' + at.name, W/2, 110, 7, at.primary === '#FFFFFF' ? '#CCCCCC' : at.primary);
  }

  const COLS=7, CW=122, CH=80, GAP=8;
  const sx = (W - (COLS*CW + (COLS-1)*GAP)) / 2;
  const sy = 140;

  TEAMS.forEach((t, i) => {
    const c = i % COLS, r = Math.floor(i / COLS);
    const cx = sx + c*(CW+GAP), cy = sy + r*(CH+GAP);
    const hov = inRect(mouse.x, mouse.y, cx, cy, CW, CH);
    const dis = isHome && i === cfg.awayIdx;

    ctx.globalAlpha = dis ? 0.3 : 1.0;
    frect(cx, cy, CW, CH, hov ? '#1e2040' : '#10101e');
    srect(cx, cy, CW, CH, dis ? '#333' : hov ? '#FFFF44' : t.primary, hov ? 3 : 2);

    if (!dis) {
      frect(cx+2, cy+2, CW-4, 8, t.primary);
      frect(cx+2 + (CW-4)/2, cy+2, (CW-4)/2, 8, t.accent);
    }

    // Flag
    ctx.font = '22px serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(t.flag, cx + CW/2, cy + 34);
    ctx.globalAlpha = 1.0;

    // Name
    ctx.font = `6px "Press Start 2P", monospace`;
    ctx.fillStyle = dis ? '#444' : hov ? '#FFFF44' : '#CCCCCC';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    const ws = t.name.split(' ');
    if (ws.length > 1) {
      ctx.fillText(ws[0],             cx+CW/2, cy+56);
      ctx.fillText(ws.slice(1).join(' '), cx+CW/2, cy+67);
    } else {
      ctx.fillText(t.name, cx+CW/2, cy+60);
    }
  });
}

// ═══════════════════════════════════════
//  GAME: FIELD  (catcher's-eye perspective)
// ═══════════════════════════════════════
//
//  Key reference points (screen coords):
//    Horizon  y=190   Mound (512,282)
//    1B (712,415)     2B (512,302)     3B (312,415)
//    Home plate pentagon centered near y=485
//    Batter sprite at (512,472) — feet just above plate
//
function drawField() {
  const HY = 185;

  // ── 1. SKY ──────────────────────────────
  const sky = ctx.createLinearGradient(0, 0, 0, HY);
  sky.addColorStop(0, '#060d1f');
  sky.addColorStop(1, '#0e2848');
  ctx.fillStyle = sky; ctx.fillRect(0, 0, W, HY);

  [[216, 28], [808, 28]].forEach(([lx, ly]) => {
    const g = ctx.createRadialGradient(lx, ly, 0, lx, ly, 72);
    g.addColorStop(0, 'rgba(255,242,190,0.28)');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g; ctx.fillRect(lx-72, 0, 144, HY);
    frect(lx-4, ly, 8, 20, '#BBBBA8');
  });

  for (let i = 0; i < W; i += 13) {
    const h = 6 + (Math.abs(Math.sin(i*0.11+1)*5 + Math.sin(i*0.27)*4))|0;
    const s = 20 + (Math.sin(i*0.09)*5)|0;
    frect(i, HY-h-3, 12, h, `rgb(${s+8},${s},${s+20})`);
  }

  frect(0, HY-4, W, 20, '#1b3e14');
  frect(0, HY-4, W, 3,  '#0c1c08');

  // ── 2. OUTFIELD GRASS ───────────────────
  frect(0, HY+16, W, H - HY - 16, '#1d5c1d');
  for (let i = 0; i < 12; i++) {
    const t0 = i/12, t1 = (i+1)/12;
    const y0 = lerp(HY+16, H, t0*t0)|0;
    const y1 = lerp(HY+16, H, t1*t1)|0;
    if (i%2 === 1) frect(0, y0, W, y1-y0, '#1b5419');
  }

  // ── 3. FOUL LINES ───────────────────────
  ctx.save();
  ctx.strokeStyle = 'rgba(255,255,255,0.50)'; ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(512, 490); ctx.lineTo(80,  HY+16);
  ctx.moveTo(512, 490); ctx.lineTo(944, HY+16);
  ctx.stroke(); ctx.restore();

  // ── 4. INFIELD DIRT ─────────────────────
  // Correct geometry: 1B/3B at 90ft, mound at 60.5ft, so mound BELOW 1B/3B on screen
  ctx.beginPath();
  ctx.moveTo(476, 486);    // left of home
  ctx.lineTo(278, 452);    // toward 3B outer
  ctx.lineTo(270, 365);    // 3B height, left
  ctx.lineTo(344, 260);    // upper left toward 2B
  ctx.lineTo(512, 246);    // top, above 2B
  ctx.lineTo(680, 260);    // upper right
  ctx.lineTo(754, 365);    // 1B height, right
  ctx.lineTo(746, 452);    // toward 1B outer
  ctx.lineTo(548, 486);    // right of home
  ctx.closePath();
  ctx.fillStyle = '#5c3b1c'; ctx.fill();

  // ── 5. INFIELD GRASS DIAMOND ────────────
  // 2B(512,248) 1B(706,318) 3B(318,318) — note: 1B/3B appear ABOVE mound (farther from home)
  ctx.beginPath();
  ctx.moveTo(512, 472); ctx.lineTo(698, 316);
  ctx.lineTo(512, 246); ctx.lineTo(326, 316);
  ctx.closePath();
  ctx.fillStyle = '#236e23'; ctx.fill();

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(512, 472); ctx.lineTo(698, 316); ctx.lineTo(512, 246); ctx.lineTo(326, 316); ctx.closePath();
  ctx.clip();
  ctx.strokeStyle = 'rgba(30,100,30,0.4)'; ctx.lineWidth = 8;
  for (let d = -300; d < 600; d += 26) {
    ctx.beginPath(); ctx.moveTo(d, 180); ctx.lineTo(d+200, 510); ctx.stroke();
  }
  ctx.restore();

  // ── 6. BASE PATHS ───────────────────────
  ctx.strokeStyle = '#7a4e28'; ctx.lineWidth = 8; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(512, 472); ctx.lineTo(698, 316);
  ctx.moveTo(698, 316); ctx.lineTo(512, 246);
  ctx.moveTo(512, 246); ctx.lineTo(326, 316);
  ctx.moveTo(326, 316); ctx.lineTo(512, 472);
  ctx.stroke();

  // ── 7. PITCHER'S MOUND ──────────────────
  // Mound at correct depth: between 1B/3B (y≈316) and home (y≈472)
  // Baseball: mound is 60.5ft from home, 1B is 90ft — so mound is closer to home
  ctx.beginPath(); ctx.ellipse(512, 398, 20, 10, 0, 0, Math.PI*2);
  ctx.fillStyle = '#7a4a2a'; ctx.fill();
  ctx.strokeStyle = '#5a3215'; ctx.lineWidth = 1; ctx.stroke();
  frect(508, 394, 8, 4, '#FFFFFF88');

  // ── 8. HOME PLATE ───────────────────────
  ctx.beginPath();
  ctx.moveTo(512, 472); ctx.lineTo(524, 479);
  ctx.lineTo(524, 487); ctx.lineTo(500, 487);
  ctx.lineTo(500, 479);
  ctx.closePath();
  ctx.fillStyle = '#FFFFFF'; ctx.fill();
  ctx.strokeStyle = '#CCCCCC'; ctx.lineWidth = 1; ctx.stroke();

  // ── 9. BASES ────────────────────────────
  drawFieldBases();

  // ── 10. STRIKE ZONE ─────────────────────
  drawStrikeZone();
}

// Draw bases at their perspective positions; highlight when occupied
function drawFieldBases() {
  [
    { x:698, y:316, idx:0 },   // 1B — 90ft from home, above mound on screen
    { x:512, y:248, idx:1 },   // 2B — furthest, near horizon
    { x:326, y:316, idx:2 },   // 3B
  ].forEach(({ x, y, idx }) => {
    const on = gs.bases[idx];
    const sz = idx === 1 ? 10 : 13;  // 2B smaller
    ctx.save();
    ctx.translate(x, y); ctx.rotate(Math.PI/4);
    frect(-sz/2, -sz/2, sz, sz, on ? '#FFE840' : '#DDD0A0');
    srect(-sz/2, -sz/2, sz, sz, on ? '#FFFFFF' : '#9A8860', 1.5);
    ctx.restore();
  });
}

function drawStrikeZone() {
  const { topY, topHW, botY, botHW, cx } = SZ;

  // Semi-transparent fill
  ctx.beginPath();
  ctx.moveTo(cx-topHW, topY); ctx.lineTo(cx+topHW, topY);
  ctx.lineTo(cx+botHW, botY); ctx.lineTo(cx-botHW, botY);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,255,220,0.06)'; ctx.fill();

  // Border — dashed
  ctx.strokeStyle = 'rgba(255,255,180,0.80)';
  ctx.lineWidth = 2; ctx.setLineDash([6,4]); ctx.stroke(); ctx.setLineDash([]);

  // Inner 3×3 grid (perspective-correct vertical dividers)
  ctx.strokeStyle = 'rgba(255,255,180,0.25)'; ctx.lineWidth = 1;
  for (let t = 1; t <= 2; t++) {
    const f = t/3;
    ctx.beginPath();
    ctx.moveTo(cx - topHW + topHW*2*f, topY);
    ctx.lineTo(cx - botHW + botHW*2*f, botY);
    ctx.stroke();
  }
  for (let t = 1; t <= 2; t++) {
    const f = t/3, y = topY + (botY-topY)*f;
    const hw = topHW + (botHW-topHW)*f;
    ctx.beginPath(); ctx.moveTo(cx-hw, y); ctx.lineTo(cx+hw, y); ctx.stroke();
  }
}

function drawScoreboard() {
  const aw = TEAMS[cfg.awayIdx], hm = TEAMS[cfg.homeIdx];

  frect(0, 0, W, 62, '#0c0c0c');
  srect(0, 0, W, 62, '#2a2a3a', 1);

  // Away strip (CPU)
  frect(0, 0, 175, 62, aw.primary + 'DD');
  txt(aw.name.slice(0,9), 88, 14, 5, aw.secondary);
  frect(4, 24, 32, 13, '#FF8844AA');
  txt('CPU', 20, 30, 5, '#FFFFFF');
  txt(pad2(gs.score.away), 88, 46, 16, aw.secondary);

  // Home strip (YOU)
  frect(W-175, 0, 175, 62, hm.primary + 'DD');
  txt(hm.name.slice(0,9), W-88, 14, 5, hm.secondary);
  frect(W-36, 24, 32, 13, '#44FF88AA');
  txt('YOU', W-20, 30, 5, '#000000');
  txt(pad2(gs.score.home), W-88, 46, 16, hm.secondary);

  // Inning center
  const ordinals = ['','1ST','2ND','3RD','4TH','5TH','6TH','7TH','8TH','9TH'];
  txt(ordinals[gs.inning] || `${gs.inning}TH`, W/2, 14, 8, '#FFFFFF');
  txt(gs.half==='TOP' ? '▲' : '▼', W/2, 42, 16, gs.half==='TOP' ? '#FF8844' : '#44AAFF');

  // Inning-by-inning grid
  const gx0 = 185, colW = Math.min(38, (W-400-120) / cfg.innings);
  ctx.font = pxFont(6); ctx.textAlign='center'; ctx.textBaseline='middle';
  for (let i=0; i<cfg.innings; i++) {
    const gx = gx0 + i*colW + colW/2;
    ctx.fillStyle = (gs.inning===i+1) ? '#FFFF44' : '#445566';
    ctx.fillText(i+1, gx, 10);
    const av = gs.inningScores.away[i], hv = gs.inningScores.home[i];
    ctx.fillStyle = '#99AABB';
    ctx.fillText(av!==null ? av : '-', gx, 32);
    ctx.fillText(hv!==null ? hv : '-', gx, 52);
  }

  // BSO lights
  drawBSO(W-360, 4);
}

function pad2(n) { return String(n).padStart(2,'0'); }

function drawBSO(x, y) {
  // B=3 lights, S=2, O=2
  const labels=['B','S','O'], counts=[gs.balls, gs.strikes, gs.outs];
  const lights=[3,2,2], cols=['#44FF44','#FFFF44','#FF4444'];
  labels.forEach((lb, i) => {
    const lx = x + i*58;
    txt(lb, lx, y+9, 6, '#AAAAAA');
    for (let j=0; j<lights[i]; j++) {
      const bx = lx - (lights[i]-1)*9 + j*18 - 9;
      const on = j < counts[i];
      frect(bx, y+18, 14, 14, on ? cols[i] : '#1e1e2e');
      srect(bx, y+18, 14, 14, on ? cols[i] : '#3a3a4a', 1);
    }
  });
}

  const sk = '#F0C090', sh = '#111122', be = '#333344';

  frect(-7, -14, 14, 2, be);
  // Jersey body
  frect(-7, -26, 14, 12, jerseyC);
  // Sleeve left arm
  frect(-12, -26, 5, 5, jerseyC);
  // Sleeve right arm
  frect(7, -26, 5, 5, jerseyC);

      ctx.beginPath(); ctx.moveTo(7, -23); ctx.lineTo(-22, -48); ctx.stroke();

    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  });

// ═══════════════════════════════════════
//  PHASE 2: GAME LOGIC
// ═══════════════════════════════════════
function lerp(a, b, t) { return a + (b - a) * t; }

function isInStrikeZone(x, y) {
  if (y < SZ.topY || y > SZ.botY) return false;
  const frac = (y - SZ.topY) / (SZ.botY - SZ.topY);
  const hw = SZ.topHW + (SZ.botHW - SZ.topHW) * frac;
  return Math.abs(x - SZ.cx) <= hw;
}

function setPitch(tx, ty) {
  const pt = PITCH_TYPES[gs.pitchType];
  gs.pitch.targetX = tx;
  gs.pitch.targetY = ty;
  const angle = Math.random() * Math.PI * 2;
  const dist  = Math.random() * pt.ctrl;
  gs.pitch.actualX = tx + Math.cos(angle) * dist;
  gs.pitch.actualY = ty + Math.sin(angle) * dist;
  gs.pitch.t      = 0;
  gs.pitch.speed  = pt.spd;
  gs.pitch.curve  = gs.pitchType === 1 ? (Math.random() * 30 - 15) : 0;
  gs.pitch.dropArc = gs.pitchType === 2 ? 40 : 22;
  gs.gamePhase = 'BALL_FLIGHT';
}

function easeOut(t) { return 1 - Math.pow(1 - t, 2); }

function doSwing() {
  const t    = gs.pitch.t;
  const dist = Math.hypot(gs.batX - gs.pitch.actualX, gs.batY - gs.pitch.actualY);

  // ── Timing score (when in the window did player swing?) ──
  const timingScore = t < 0.82 ? 0.65 : t < 0.93 ? 1.0 : 0.72;
  const timingLabel = t < 0.82 ? 'EARLY' : t < 0.93 ? 'PERFECT' : 'LATE';

  // ── Distance score (how well did bat meet ball?) ──
  let distScore;
  if      (dist < 15) distScore = 1.0;
  else if (dist < 38) distScore = lerp(1.0, 0.55, (dist-15)/23);
  else if (dist < 60) distScore = lerp(0.55, 0.05, (dist-38)/22);
  else                distScore = 0.0;

  const quality = distScore * timingScore;
  const qr = quality + (Math.random() * 0.10 - 0.05); // small variance

  // Trigger swing animation (hides static bat)
  gs.swingAnim = { active:true, t:0, hitQuality:quality };

  // ── Complete miss ──
  if (distScore === 0) {
    gs.strikes++;
    gs.lastResultType = 'STRIKE';
    if (gs.strikes >= 3) {
      gs.outs++; gs.balls=0; gs.strikes=0;
      showResult('STRIKEOUT!', '#FF4444', 110, timingLabel + '  TIMING');
    } else {
      showResult('SWING  MISS', '#FF6644', 85, timingLabel + '  TIMING');
    }
    return;
  }

  // ── Hit quality → result ──
  if (qr > 0.90) {
    gs.lastResultType = 'HR';
    advanceRunners(4);
    setHitFlight('HR');
    if (isWalkOff()) gs.walkOffPending = true;
    showResult('HOME  RUN!!', '#FFD700', 150, 'PERFECT  CONTACT!');
  } else if (qr > 0.68) {
    gs.lastResultType = '2B';
    advanceRunners(2);
    setHitFlight('2B');
    if (isWalkOff()) gs.walkOffPending = true;
    showResult('DOUBLE!', '#44EEFF', 110, timingLabel + '  TIMING');
  } else if (qr > 0.43) {
    gs.lastResultType = '1B';
    advanceRunners(1);
    setHitFlight('1B');
    if (isWalkOff()) gs.walkOffPending = true;
    showResult('SINGLE!', '#44FF88', 100, timingLabel + '  TIMING');
  } else if (qr > 0.18) {
    gs.lastResultType = 'FOUL';
    gs.strikes = Math.min(2, gs.strikes + 1);
    showResult('FOUL  BALL', '#FF8844', 80, timingLabel + '  TIMING');
  } else {
    gs.lastResultType = 'OUT';
    gs.outs++;
    if (gs.outs >= 3) {
      showResult('3  OUTS!', '#FF4444', 120, 'INNING  OVER');
    } else {
      showResult('OUT!', '#FF6644', 90, 'WEAK  CONTACT');
    }
  }
}

function resolveNoPitch() {
  const inZone = isInStrikeZone(gs.pitch.actualX, gs.pitch.actualY);
  if (inZone) {
    gs.strikes++;
    gs.lastResultType = 'STRIKE';
    if (gs.strikes >= 3) {
      gs.outs++; gs.balls=0; gs.strikes=0;
      showResult('STRIKEOUT!', '#FF4444', 110, 'CALLED  STRIKE  3');
    } else {
      showResult('STRIKE!', '#FF8844', 80, 'CALLED  STRIKE');
    }
  } else {
    gs.balls++;
    gs.lastResultType = 'BALL';
    if (gs.balls >= 4) {
      gs.balls=0; gs.strikes=0;
      walkBatter();
      if (isWalkOff()) gs.walkOffPending = true;
      showResult('WALK!', '#44AAFF', 100, 'BASE  ON  BALLS');
    } else {
      showResult('BALL!', '#44FF44', 80, '');
    }
  }
}

function showResult(text, color, frames, subtext='') {
  gs.result.text = text;
  gs.result.color = color;
  gs.result.timer = frames;
  gs.result.maxTimer = frames;
  gs.result.subtext = subtext;
  gs.gamePhase = 'SHOW_RESULT';
}

function nextPitch() {
  gs.swingAnim = { active:false, t:0, hitQuality:0 };
  if (gs.walkOffPending) {
    const idx = gs.inning - 1;
    gs.inningScores.home[idx] = gs.score.home - gs.halfStartScore.home;
    phase = 'GAME_OVER';
    return;
  }
  if (gs.outs >= 3) { startHalfChange(); return; }
  gs.pitch.t = 0;
  gs.pitch.aimX = SZ.cx;
  gs.pitch.aimY = (SZ.topY + SZ.botY) / 2;
  if (isPlayerBatting()) gs.cpuTimer = 55 + Math.floor(Math.random()*35);
  gs.gamePhase = 'PITCH_AIM';
}

function walkBatter() {
  let runs = 0;
  if (gs.bases[0] && gs.bases[1] && gs.bases[2]) { runs = 1; }
  else {
    if (gs.bases[0] && gs.bases[1]) gs.bases[2] = true;
    if (gs.bases[0]) gs.bases[1] = true;
  }
  gs.bases[0] = true;
  if (runs > 0) {
    const side = gs.half === 'TOP' ? 'away' : 'home';
    if (side === 'away') gs.score.away += runs; else gs.score.home += runs;
    gs.runFlash = { runs, timer:90, side };
  }
}

function advanceRunners(bases) {
  let runs = 0;
  const next = [false, false, false];
  for (let b = 2; b >= 0; b--) {
    if (!gs.bases[b]) continue;
    const dest = b + bases;
    if (dest >= 3) runs++;
    else next[dest] = true;
  }
  const bDest = bases - 1;
  if (bDest >= 3) runs++;
  else next[bDest] = true;
  gs.bases = next;
  if (runs > 0) {
    const side = gs.half === 'TOP' ? 'away' : 'home';
    if (side === 'away') gs.score.away += runs; else gs.score.home += runs;
    gs.runFlash = { runs, timer:90, side };
  }
}

function startHalfChange() {
  const ordinals = ['','1ST','2ND','3RD','4TH','5TH','6TH','7TH','8TH','9TH'];
  const idx = gs.inning - 1;
  // Record this half's run total before switching
  if (gs.half === 'TOP') {
    gs.inningScores.away[idx] = gs.score.away - gs.halfStartScore.away;
  } else {
    gs.inningScores.home[idx] = gs.score.home - gs.halfStartScore.home;
  }
  const isLastHalf = gs.half === 'BOT' && gs.inning >= cfg.innings;
  const isTied     = gs.score.away === gs.score.home;
  if (isLastHalf && !isTied) {
    // Game over — show final score
    gs.halfChange = {
      line1: 'GAME  SET!',
      line2: TEAMS[cfg.awayIdx].name.slice(0,9) + '  ' + pad2(gs.score.away),
      line3: TEAMS[cfg.homeIdx].name.slice(0,9) + '  ' + pad2(gs.score.home),
      col: '#FFD700', timer: 180, maxTimer: 180, gameOver: true
    };
  } else {
    const nextHalf   = gs.half === 'TOP' ? 'BOT' : 'TOP';
    const nextInning = gs.half === 'BOT' ? gs.inning + 1 : gs.inning;
    const batting    = nextHalf === 'TOP' ? TEAMS[cfg.awayIdx] : TEAMS[cfg.homeIdx];
    const isExtra    = nextInning > cfg.innings;
    gs.halfChange = {
      line1: isExtra ? 'EXTRA  INNING!' : 'SIDE  RETIRED',
      line2: (nextHalf==='TOP' ? '▲  TOP' : '▼  BOT') + '  ' + (ordinals[nextInning]||nextInning+'TH') + '  INN',
      line3: batting.name.slice(0,10) + '  TO  BAT',
      col: nextHalf === 'TOP' ? '#FF8844' : '#44AAFF',
      timer: 160, maxTimer: 160, gameOver: false
    };
  }
  gs.gamePhase = 'HALF_CHANGE';
}

function finishHalfChange() {
  if (gs.halfChange.gameOver) { phase = 'GAME_OVER'; return; }
  if (gs.half === 'TOP') {
    gs.half = 'BOT';
    gs.halfStartScore = { away: gs.score.away, home: gs.score.home };
  } else {
    gs.inning++;
    gs.half = 'TOP';
    gs.halfStartScore = { away: gs.score.away, home: gs.score.home };
  }
  gs.outs = 0; gs.balls = 0; gs.strikes = 0;
  gs.bases = [false, false, false];
  gs.pitch.t = 0;
  gs.pitch.aimX = SZ.cx;
  gs.pitch.aimY = (SZ.topY + SZ.botY) / 2;
  gs.swingAnim = { active:false, t:0, hitQuality:0 };
  if (isPlayerBatting()) gs.cpuTimer = 60 + Math.floor(Math.random()*30);
  gs.gamePhase = 'PITCH_AIM';
}

// Player is always HOME team — bats in BOT half, pitches in TOP half
function isPlayerBatting() { return gs.half === 'BOT'; }

function doCpuPitch() {
  // CPU picks pitch type (weighted: 50% fast, 30% curve, 20% change)
  const r = Math.random();
  gs.pitchType = r < 0.50 ? 0 : r < 0.80 ? 1 : 2;
  // CPU aims: 65% in zone, 35% outside
  let tx, ty;
  if (Math.random() < 0.65) {
    tx = SZ.cx + (Math.random() * 2 - 1) * SZ.botHW * 0.75;
    ty = SZ.topY + Math.random() * (SZ.botY - SZ.topY);
  } else {
    const side = Math.floor(Math.random() * 4);
    if (side === 0) { tx = SZ.cx - SZ.botHW - 15 - Math.random()*20; ty = SZ.topY + Math.random()*(SZ.botY-SZ.topY); }
    else if (side === 1) { tx = SZ.cx + SZ.botHW + 15 + Math.random()*20; ty = SZ.topY + Math.random()*(SZ.botY-SZ.topY); }
    else if (side === 2) { tx = SZ.cx + (Math.random()*2-1)*SZ.topHW; ty = SZ.topY - 20 - Math.random()*18; }
    else                 { tx = SZ.cx + (Math.random()*2-1)*SZ.botHW; ty = SZ.botY + 18 + Math.random()*16; }
  }
  gs.pitch.aimX = tx; gs.pitch.aimY = ty;
  setPitch(tx, ty);
}

function doCpuSwing() {
  const inZone = isInStrikeZone(gs.pitch.actualX, gs.pitch.actualY);
  if (Math.random() < (inZone ? 0.72 : 0.18)) {
    const err = 38;
    gs.batX = gs.pitch.actualX + (Math.random()*err*2 - err);
    gs.batY = gs.pitch.actualY + (Math.random()*err*2 - err);
    doSwing();
  }
  // else: no swing — resolveNoPitch() fires when t>=1
}

function updateGame() {
  const gp = gs.gamePhase;

  // CPU auto-pitch (player is batting = BOT half)
  if (gp === 'PITCH_AIM' && isPlayerBatting()) {
    if (--gs.cpuTimer <= 0) doCpuPitch();
  }

  if (gp === 'BALL_FLIGHT' || gp === 'BATTING_WINDOW') {
    gs.pitch.t = Math.min(1.0, gs.pitch.t + gs.pitch.speed);
    if (gs.pitch.t >= 0.72 && gp === 'BALL_FLIGHT') {
      gs.gamePhase = 'BATTING_WINDOW';
      // CPU auto-swing (player is pitching = TOP half)
      if (!isPlayerBatting()) {
        const inZ = isInStrikeZone(gs.pitch.actualX, gs.pitch.actualY);
        gs.cpuTimer = inZ ? 10 + Math.floor(Math.random()*18) : 6 + Math.floor(Math.random()*22);
      }
    }
    if (gp === 'BATTING_WINDOW' && !isPlayerBatting()) {
      if (--gs.cpuTimer === 0) doCpuSwing();
    }
    if (gs.pitch.t >= 1.0) resolveNoPitch();
  } else if (gp === 'SHOW_RESULT') {
    gs.result.timer--;
    if (gs.result.timer <= 0) nextPitch();
  } else if (gp === 'HALF_CHANGE') {
    gs.halfChange.timer--;
    if (gs.halfChange.timer <= 0) finishHalfChange();
  }
  if (gs.swingAnim.active) {
    gs.swingAnim.t = Math.min(1.0, gs.swingAnim.t + 0.065);
    if (gs.swingAnim.t >= 1.0) gs.swingAnim.active = false;
  }
  if (gs.runFlash.timer > 0) gs.runFlash.timer--;
  if (gs.hitFlight.active) {
    gs.hitFlight.t = Math.min(1.0, gs.hitFlight.t + 1 / gs.hitFlight.dur);
    if (gs.hitFlight.t >= 1.0) gs.hitFlight.active = false;
  }
}

  [[ax-22,ay,ax-13,ay],[ax+13,ay,ax+22,ay],[ax,ay-22,ax,ay-13],[ax,ay+13,ax,ay+22]].forEach(([x1,y1,x2,y2])=>{
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();

// ═══════════════════════════════════════
//  PHASE 2: DRAW — BALL FLIGHT
// ═══════════════════════════════════════
function drawBallFlight() {
  const gp = gs.gamePhase;
  if (gp === 'PITCH_AIM') return;

  const { t, actualX, actualY, targetX, targetY, curve, dropArc } = gs.pitch;
  const { x: sx, y: sy } = PITCH_START;
  const pt = PITCH_TYPES[gs.pitchType];

  // Ghost of aimed target
  ctx.beginPath();
  ctx.arc(targetX, targetY, 9, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255,255,100,0.28)';
  ctx.lineWidth = 1; ctx.setLineDash([3,3]); ctx.stroke(); ctx.setLineDash([]);

  if (gp === 'SHOW_RESULT') {
    // Hide frozen ball if hit-flight animation took over
    if (!gs.hitFlight.active) {
      drawBall(actualX, actualY, 13);
      const inZ = isInStrikeZone(actualX, actualY);
      ctx.beginPath(); ctx.arc(actualX, actualY + 14, 5, 0, Math.PI*2);
      ctx.fillStyle = inZ ? '#44FF44' : '#FF4444'; ctx.fill();
    }
    return;
  }

  // Parabolic arc with pitch-type curve and drop
  const bx = lerp(sx, actualX, t) + curve * t * (1 - t) * 4;
  const by = lerp(sy, actualY, t) - dropArc * t * (1 - t);
  const radius = lerp(3, 13, t * t);

  // Pitch type glow ring (early flight only)
  if (t < 0.5) {
    ctx.beginPath(); ctx.arc(bx, by, radius + 4, 0, Math.PI*2);
    ctx.strokeStyle = pt.col + '55'; ctx.lineWidth = 3; ctx.stroke();
  }

  // Trail
  for (let i = 5; i >= 1; i--) {
    const tt = Math.max(0, t - i * 0.038);
    const tx2 = lerp(sx, actualX, tt) + curve * tt * (1 - tt) * 4;
    const ty2 = lerp(sy, actualY, tt) - dropArc * tt * (1 - tt);
    const tr = lerp(2, 10, tt * tt);
    ctx.beginPath(); ctx.arc(tx2, ty2, tr, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,200,${(6-i) * 0.028})`;
    ctx.fill();
  }

  drawBall(bx, by, radius);
}

}

// ═══════════════════════════════════════
//  PHASE 3: DRAW — SWING ANIMATION
// ═══════════════════════════════════════
function drawSwingAnim() {
  if (!gs.swingAnim.active) return;
  const { t, hitQuality } = gs.swingAnim;
  const et = easeOut(t);

  ctx.save();
  ctx.translate(672, 524);
  ctx.scale(3.8, 3.8);

  // Bat sweeps from rest (upper-right over shoulder) through contact to follow-through (upper-left)
  const pivX = -11, pivY = -30;
  const tipX = lerp(14, -22, et);
  const tipY = lerp(-56, -50, et);

  // Motion trail
  for (let i = 3; i >= 1; i--) {
    const et2 = Math.max(0, et - i * 0.18);
    const tx2 = lerp(-22, 22, et2);
    const ty2 = lerp(-48, -36, et2);
    ctx.strokeStyle = `rgba(180,140,80,${(4-i)*0.07})`;
    ctx.lineWidth = 2; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(pivX, pivY); ctx.lineTo(tx2, ty2); ctx.stroke();
  }

  // Bat
  ctx.strokeStyle = '#7B3F00'; ctx.lineWidth = 3.5; ctx.lineCap = 'round';
  ctx.beginPath(); ctx.moveTo(pivX, pivY); ctx.lineTo(tipX, tipY); ctx.stroke();
  ctx.beginPath(); ctx.arc(pivX+1, pivY+1, 3, 0, Math.PI*2);
  ctx.fillStyle = '#5C2E00'; ctx.fill();
  ctx.restore();

  // Contact flash for good hits — at ball landing position
  if (hitQuality > 0.43 && et > 0.25 && et < 0.72) {
    const flashA = Math.sin((et - 0.25) / 0.47 * Math.PI);
    const { actualX: fx, actualY: fy } = gs.pitch;
    ctx.beginPath(); ctx.arc(fx, fy, 44 * et, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(255,220,50,${flashA * 0.9})`; ctx.lineWidth = 5; ctx.stroke();
    ctx.beginPath(); ctx.arc(fx, fy, 22 * et, 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,255,180,${flashA * 0.4})`; ctx.fill();
    // Star sparks
    for (let s = 0; s < 6; s++) {
      const ang = s * Math.PI/3 + et*4;
      const sr = 30 * et * flashA;
      ctx.beginPath(); ctx.moveTo(fx, fy);
      ctx.lineTo(fx + Math.cos(ang)*sr, fy + Math.sin(ang)*sr);
      ctx.strokeStyle = `rgba(255,240,100,${flashA*0.6})`; ctx.lineWidth=2; ctx.stroke();
    }
  }
}

// ═══════════════════════════════════════
//  PHASE 5: WALK-OFF / HIT FLIGHT / PITCH HUD
// ═══════════════════════════════════════
function isWalkOff() {
  if (gs.half !== 'BOT') return false;
  if (gs.inning < cfg.innings) return false;
  return gs.score.home > gs.score.away;
}

function setHitFlight(type) {
  const cx = gs.pitch.actualX, cy = gs.pitch.actualY;
  let tx, ty, dur, arcH;
  const goRight = cx > W/2;
  if (type === 'HR') {
    tx = cx + (goRight ? 190 : -190); ty = 175; dur = 90; arcH = 120;
  } else if (type === '2B') {
    tx = cx + (goRight ? 110 : -110); ty = 235; dur = 65; arcH = 72;
  } else {
    tx = cx + (goRight ? 65 : -65);   ty = 315; dur = 48; arcH = 42;
  }
  gs.hitFlight = { active:true, sx:cx, sy:cy, tx, ty, t:0, dur, arcH, type };
}

function drawHitFlight() {
  if (!gs.hitFlight.active) return;
  const { sx, sy, tx, ty, t, arcH, type } = gs.hitFlight;
  const et = easeOut(t);
  const bx = lerp(sx, tx, et);
  const by = lerp(sy, ty, et) - arcH * t * (1 - t) * 4;
  const radius = lerp(13, type === 'HR' ? 10 : 8, t);
  const alpha = t > 0.75 ? 1 - (t - 0.75) / 0.25 : 1.0;

  ctx.globalAlpha = alpha;

  // Trail
  for (let i = 4; i >= 1; i--) {
    const tt = Math.max(0, t - i * 0.06);
    const et2 = easeOut(tt);
    const tx2 = lerp(sx, tx, et2);
    const ty2 = lerp(sy, ty, et2) - arcH * tt * (1 - tt) * 4;
    ctx.beginPath(); ctx.arc(tx2, ty2, lerp(8, 4, tt), 0, Math.PI*2);
    ctx.fillStyle = `rgba(255,220,80,${(5-i)*0.07})`; ctx.fill();
  }

  drawBall(bx, by, radius);

  if (type === 'HR') {
    ctx.beginPath(); ctx.arc(bx, by, radius + 9, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(255,200,50,${alpha * 0.55})`; ctx.lineWidth = 3; ctx.stroke();
  }

  ctx.globalAlpha = 1.0;
}

function drawPitchTypeHUD() {
  const bw = 80, bh = 28, gap = 6;
  const startX = 12;
  const by = H - 54;

  txt('PITCH:', startX + 124, by - 12, 5, '#888899');

  PITCH_TYPES.forEach((pt, i) => {
    const bx = startX + i * (bw + gap);
    const sel = i === gs.pitchType;
    const hov = inRect(mouse.x, mouse.y, bx, by, bw, bh);
    frect(bx, by, bw, bh, sel ? '#141e14' : '#0a0a18');
    srect(bx, by, bw, bh, sel ? pt.col : hov ? pt.col + '88' : '#333355', sel ? 3 : 2);
    txt(pt.label, bx + bw/2, by + 10, 6, sel ? pt.col : '#AAAAAA');
    txt(pt.desc,  bx + bw/2, by + 22, 4, sel ? '#FFFFFF' : '#555577');
  });

  if ((tick >> 4) % 2 === 0) {
    txt('CLICK  TO  PITCH', startX + 124, H - 18, 6, '#FFFF44');
  }
}

// ═══════════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════════
function loop() {
  ctx.clearRect(0, 0, W, H);

  if (phase === 'TITLE')        { drawTitle();         drawMouseCursor(); }
  else if (phase === 'SETUP_INNING') { drawSetupInning();  drawMouseCursor(); }
  else if (phase === 'SETUP_AWAY')   { drawSetupTeam(false); drawMouseCursor(); }
  else if (phase === 'SETUP_HOME')   { drawSetupTeam(true);  drawMouseCursor(); }
  else if (phase === 'GAME') {
    updateGame();
    const pitching = gs.half==='TOP' ? TEAMS[cfg.homeIdx]  : TEAMS[cfg.awayIdx];
    const batting  = gs.half==='TOP' ? TEAMS[cfg.awayIdx]  : TEAMS[cfg.homeIdx];
    drawField();
    drawFielders();
    drawPitcher(512, 388, pitching);
    drawBallFlight();
    drawHitFlight();
    drawBatterBack(672, 524, batting, !gs.swingAnim.active);
    drawSwingAnim();
    drawAimCursor();
    drawSwingPrompt();
    drawBatterCursor();
    drawScoreboard();
    drawRunFlash();
    drawBaseDiamond();
    drawResult();
    drawInfoPanel();
    drawHalfChange();
  }
  else if (phase === 'GAME_OVER') { drawGameOver(); drawMouseCursor(); }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
